<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>日本の都道府県クイズ</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    html { font-size: 100%; }
    body {
      margin: 0;
      background: #ffffff;
      color: #000000;
      font-family: "Yu Gothic UI", "Meiryo", system-ui, -apple-system, "Segoe UI", sans-serif;
      padding: 28px;
      font-size: clamp(16px, 2.8vw, 18px);
    }
    .wrap {
      width: min(1100px, 100%);
      margin: 0 auto;
      border: 3px solid #000000;
      border-radius: 14px;
      padding: 22px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.35rem, 5vw, 2rem);
      font-weight: 900;
      letter-spacing: 0.02em;
    }
    .sub {
      margin: 0 0 16px;
      font-size: clamp(16px, 3.8vw, 1.2rem);
      line-height: 1.7;
      font-weight: 700;
    }
    .hud {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin: 14px 0 18px;
    }
    .pill {
      border: 2px solid #000000;
      border-radius: 12px;
      padding: 10px 16px;
      font-size: clamp(16px, 4vw, 1.35rem);
      font-weight: 900;
      background: #ffffff;
    }
    .mapBox {
      border: 3px solid #000000;
      border-radius: 12px;
      padding: 10px;
      background: #ffffff;
    }
    .mapHeader {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      margin: 6px 6px 10px;
    }
    .question {
      font-size: clamp(16px, 4.2vw, 1.45rem);
      font-weight: 900;
    }
    .status {
      font-size: clamp(16px, 3.8vw, 1.25rem);
      font-weight: 900;
      min-height: 1.6em;
    }
    .map-container {
      width: 100%;
      max-width: 100%;
      aspect-ratio: 1000 / 620;
      margin: 0 auto;
    }
    .map-svg {
      width: 100%;
      max-width: 100%;
      height: 100%;
      display: block;
    }
    .pref {
      fill: #ffffff;
      stroke: #000000;
      stroke-width: 1.4;
      vector-effect: non-scaling-stroke;
    }
    .pref:hover {
      fill: #f0f0f0;
    }
    .pref.target {
      fill: #ff6600;
      stroke: #000000;
      stroke-width: 2.2;
    }
    .pref.correct {
      fill: #16a34a;
    }
    .pref.wrong {
      fill: #ef4444;
    }
    .choices {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }
    @media (max-width: 768px) {
      .choices { grid-template-columns: 1fr; }
    }
    button {
      border: 3px solid #000000;
      background: #ffffff;
      color: #000000;
      padding: 16px 18px;
      border-radius: 12px;
      font-size: clamp(16px, 4vw, 1.35rem);
      font-weight: 900;
      cursor: pointer;
      text-align: left;
    }
    button.choice-btn {
      min-height: 50px;
      padding-top: 14px;
      padding-bottom: 14px;
    }
    button:hover { background: #f0f0f0; }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    .controls {
      margin-top: 16px;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }
    .footer {
      margin-top: 14px;
      font-size: clamp(16px, 3.2vw, 1rem);
      line-height: 1.6;
      font-weight: 700;
    }
    .footer code { font-weight: 900; }
    @media (max-width: 768px) {
      body { padding: 12px; }
      .wrap {
        padding: 12px;
        border-width: 2px;
        border-radius: 10px;
      }
      .mapBox { padding: 8px; }
      .mapHeader { margin: 4px 4px 8px; }
      button.choice-btn {
        min-height: 54px;
        font-size: clamp(17px, 4.5vw, 1.2rem);
      }
      .controls button {
        min-height: 50px;
        padding: 14px 16px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>日本の都道府県クイズ</h1>
    <p class="sub"><strong>オレンジ色</strong>でハイライトされた都道府県を、4択から選んでください（全10問）。地図上をクリックして答えることもできます。</p>

    <section class="hud" aria-label="スコア表示">
      <div class="pill">問題: <span id="qNum">0</span> / 10</div>
      <div class="pill">スコア: <span id="score">0</span></div>
    </section>

    <section class="mapBox" aria-label="日本地図">
      <div class="mapHeader">
        <div class="question" id="question">地図を読み込み中…</div>
        <div class="status" id="status"></div>
      </div>
      <div id="map" class="map-container"></div>
    </section>

    <section class="choices" id="choices" aria-label="4択"></section>

    <div class="controls">
      <button id="restart">最初から</button>
      <button id="next" disabled>次の問題へ</button>
    </div>

    <p class="footer">
      データ: <code>dataofjapan/land</code>（地球地図日本のShapefile由来の都道府県境界TopoJSON）を使用しています。
    </p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
  <script>
    const TOPOJSON_URL = "https://cdn.jsdelivr.net/gh/dataofjapan/land@master/japan.topojson";
    const TOTAL = 10;

    const els = {
      map: document.getElementById("map"),
      question: document.getElementById("question"),
      status: document.getElementById("status"),
      choices: document.getElementById("choices"),
      qNum: document.getElementById("qNum"),
      score: document.getElementById("score"),
      restart: document.getElementById("restart"),
      next: document.getElementById("next")
    };

    const state = {
      features: [],
      byId: new Map(),
      remainingIds: [],
      asked: 0,
      score: 0,
      targetId: null,
      answered: false,
      svg: null,
      g: null,
      path: null
    };

    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function jpName(feature) {
      const p = feature && feature.properties ? feature.properties : {};
      return p.nam_ja || p.name_ja || p.name || p.nam || "（不明）";
    }

    function setStatus(text) {
      els.status.textContent = text || "";
    }

    function setQuestion(text) {
      els.question.textContent = text || "";
    }

    function updateHud() {
      els.qNum.textContent = String(state.asked);
      els.score.textContent = String(state.score);
    }

    function clearMapClasses() {
      if (!state.g) return;
      state.g.selectAll("path.pref")
        .classed("target", false)
        .classed("correct", false)
        .classed("wrong", false);
    }

    function highlightTarget() {
      clearMapClasses();
      if (!state.targetId || !state.g) return;
      state.g.select(`path.pref[data-id="${state.targetId}"]`).classed("target", true);
    }

    function lockChoices(locked) {
      const buttons = els.choices.querySelectorAll("button");
      buttons.forEach(btn => { btn.disabled = !!locked; });
    }

    function renderChoices(optionIds) {
      els.choices.innerHTML = "";
      optionIds.forEach((id, idx) => {
        const f = state.byId.get(id);
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "choice-btn";
        btn.textContent = `${idx + 1}. ${jpName(f)}`;
        btn.addEventListener("click", () => answer(id, "button"));
        els.choices.appendChild(btn);
      });
    }

    function currentTargetFeature() {
      return state.byId.get(state.targetId);
    }

    function revealCorrectWrong(selectedId) {
      if (!state.g || !state.targetId) return;
      const correctSel = state.g.select(`path.pref[data-id="${state.targetId}"]`);
      correctSel.classed("correct", true).classed("target", false);
      if (selectedId && selectedId !== state.targetId) {
        state.g.select(`path.pref[data-id="${selectedId}"]`).classed("wrong", true);
      }
    }

    function answer(selectedId, source) {
      if (state.answered) return;
      state.answered = true;
      lockChoices(true);

      const target = currentTargetFeature();
      const correct = selectedId === state.targetId;
      if (correct) {
        state.score += 10;
        setStatus("正解！");
      } else {
        setStatus("不正解…");
      }

      revealCorrectWrong(selectedId);
      updateHud();
      els.next.disabled = false;

      if (!correct && source === "map") {
        const name = jpName(target);
        setQuestion(`正解は「${name}」です。次へ進んでください。`);
      } else {
        const name = jpName(target);
        setQuestion(`この都道府県はどれ？（正解: ${name}）`);
      }
    }

    function onMapClick(feature) {
      if (!feature || !feature.properties) return;
      const id = feature.properties.id;
      if (id == null) return;
      answer(Number(id), "map");
    }

    function nextQuestion() {
      if (state.asked >= TOTAL) {
        setQuestion(`終了！スコアは ${state.score} / ${TOTAL * 10} 点です。`);
        setStatus("おつかれさまでした。");
        els.next.disabled = true;
        els.choices.innerHTML = "";
        clearMapClasses();
        return;
      }

      state.answered = false;
      els.next.disabled = true;
      setStatus("");

      const id = state.remainingIds.pop();
      state.targetId = id;
      state.asked += 1;

      const rest = state.features.map(f => f.properties.id).filter(x => x !== id);
      const options = shuffle([id, ...shuffle(rest).slice(0, 3)]);

      setQuestion("オレンジ色の都道府県はどれ？（下の4択から選択）");
      highlightTarget();
      renderChoices(options);
      lockChoices(false);
      updateHud();
    }

    function restart() {
      state.asked = 0;
      state.score = 0;
      state.targetId = null;
      state.answered = false;
      state.remainingIds = shuffle(state.features.map(f => f.properties.id)).slice(0, TOTAL);
      els.next.disabled = true;
      setStatus("");
      nextQuestion();
    }

    function buildMap(features) {
      els.map.innerHTML = "";
      const width = 1000;
      const height = 620;

      state.svg = d3.select(els.map)
        .append("svg")
        .attr("class", "map-svg")
        .attr("width", "100%")
        .attr("height", "100%")
        .attr("viewBox", `0 0 ${width} ${height}`)
        .attr("preserveAspectRatio", "xMidYMid meet")
        .attr("aria-label", "日本地図SVG")
        .attr("role", "img");

      const projection = d3.geoMercator().fitSize([width, height], { type: "FeatureCollection", features });
      state.path = d3.geoPath(projection);

      state.g = state.svg.append("g");

      state.g.selectAll("path")
        .data(features)
        .enter()
        .append("path")
        .attr("class", "pref")
        .attr("data-id", d => d.properties.id)
        .attr("d", d => state.path(d))
        .on("click", (event, d) => onMapClick(d));
    }

    async function init() {
      try {
        setQuestion("地図を読み込み中…（少し時間がかかる場合があります）");
        const topo = await fetch(TOPOJSON_URL, { cache: "force-cache" }).then(r => r.json());
        const obj = topo.objects && topo.objects.japan ? topo.objects.japan : null;
        if (!obj) throw new Error("TopoJSONの objects.japan が見つかりませんでした。");

        const fc = topojson.feature(topo, obj);
        const features = fc.features
          .filter(f => f && f.properties && typeof f.properties.id !== "undefined")
          .map(f => {
            f.properties.id = Number(f.properties.id);
            return f;
          })
          .sort((a, b) => a.properties.id - b.properties.id);

        state.features = features;
        state.byId = new Map(features.map(f => [f.properties.id, f]));

        buildMap(features);
        restart();
      } catch (e) {
        setQuestion("地図の読み込みに失敗しました。インターネット接続をご確認ください。");
        setStatus(String(e && e.message ? e.message : e));
        els.next.disabled = true;
      }
    }

    els.restart.addEventListener("click", () => restart());
    els.next.addEventListener("click", () => nextQuestion());

    init();
  </script>
</body>
</html>
